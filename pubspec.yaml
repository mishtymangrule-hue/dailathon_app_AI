name: dailathon_dialer
description: Production-grade telecom dialer for Android using Flutter + Kotlin.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management - BLoC Only
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Dio for HTTP
  dio: ^5.4.0

  # Local storage & encryption
  flutter_secure_storage: ^9.1.0

  # Permissions
  permission_handler: ^11.4.0

  # UI Components
  intl: ^0.20.2
  uuid: ^4.0.0

  # Platform channels
  url_launcher: ^6.2.5

  # Device data
  flutter_contacts: ^1.1.9+1
  call_log: ^6.0.1

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/

  # Generate code for local models
  generate: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#E0E5EC"
  adaptive_icon_foreground: "assets/app_logo.png"
