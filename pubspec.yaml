name: dailathon_dialer
description: Production-grade telecom dialer for Android using Flutter + Kotlin.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management - BLoC Only
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Dio for HTTP
  dio: ^5.4.0

  # JSON serialization
  json_annotation: ^4.8.0

  # Local storage & encryption
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.1.0

  # Permissions
  permission_handler: ^11.4.0

  # UI Components
  intl: ^0.19.0
  uuid: ^4.0.0

  # Platform channels
  flutter_typeahead: ^4.8.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  # Generate code for local models
  generate: true
