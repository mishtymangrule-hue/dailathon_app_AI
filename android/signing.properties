# Signing configuration for release builds
# NOTE: This file should be kept secure and NOT committed to version control
# Add 'signing.properties' to .gitignore

# Keystore configuration
KEYSTORE_PATH=./release.keystore
KEYSTORE_PASSWORD=your_keystore_password_here
KEY_ALIAS=dailathon_dialer_release
KEY_PASSWORD=your_key_password_here

# App versioning
APP_VERSION_CODE=1
APP_VERSION_NAME=1.0.0

# Play Store configuration
PLAY_STORE_PACKAGE_NAME=com.mangrule.dailathon
PLAY_STORE_RELEASE_NOTES=Initial release of Dailathon Dialer with multi-SIM support, call forwarding, and TG calling integration.
